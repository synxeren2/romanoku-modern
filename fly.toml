# fly.toml file generated for romanoku-modern

app = "romanoku-modern"
primary_region = "fra"

[build]

[env]
  PORT = "3000"
  STORAGE_DIR = "/data"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[mounts]]
  source = "romanoku_data"
  destination = "/data"
  initial_size = "1GB"
